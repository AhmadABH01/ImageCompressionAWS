apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: image-compression-aws
  title: Image Compression Service on AWS
  description: >-
    Serverless image compression service using R-quadtree algorithms,
    deployed on AWS with Lambda, S3, SQS, SNS and API Gateway.
  annotations:
    github.com/project-slug: ahmadabh01/imagecompressionaws
    backstage.io/techdocs-ref: dir:.
  tags:
    - java
    - maven
    - aws
    - lambda
    - s3
    - sqs
    - sns
    - serverless
    - image-processing
    - quadtree
  links:
    - url: https://mzcnrbtvod.execute-api.eu-west-3.amazonaws.com/prod/compress
      title: Compression REST API
      icon: web
spec:
  type: service
  lifecycle: experimental
  owner: ahmadabh01
  system: image-compression
  providesApis:
    - image-compression-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: image-compression-api
  title: Image Compression REST API
  description: REST API for triggering image compression jobs (lambda or phi method).
  tags:
    - rest
    - aws
    - api-gateway
spec:
  type: openapi
  lifecycle: experimental
  owner: ahmadabh01
  system: image-compression
  definition: |
    openapi: 3.0.0
    info:
      title: Image Compression API
      version: "1.0"
      description: REST API exposed by AWS API Gateway to compress PNG images stored in S3.
    servers:
      - url: https://mzcnrbtvod.execute-api.eu-west-3.amazonaws.com/prod
    paths:
      /compress:
        post:
          summary: Compress an image stored in S3
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - inputPath
                    - outputPath
                  properties:
                    inputPath:
                      type: string
                      example: s3://image-compression-input-3a8a19c0/256-tux.png
                    outputPath:
                      type: string
                      example: s3://image-compression-output-3a8a19c0/256-tux-compressed.png
                    method:
                      type: string
                      enum: [lambda, phi]
                      default: lambda
                    threshold:
                      type: integer
                      default: 30
          responses:
            "200":
              description: Compression completed successfully
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      success:
                        type: boolean
                      message:
                        type: string
                      outputPath:
                        type: string
                      eqm:
                        type: number
                      executionTimeMs:
                        type: integer
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: image-compression
  description: Serverless image compression platform on AWS.
spec:
  owner: ahmadabh01

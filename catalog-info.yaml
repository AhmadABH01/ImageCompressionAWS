# =====================================================================
# API
# =====================================================================
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: image-compression-rest-api
  description: REST API exposing POST /compress to compress an S3-stored PNG.
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: experimental
  owner: team-image-compression
  system: image-compression-aws
  definition: |
    openapi: 3.0.0
    info:
      title: Image Compression API
      version: 1.0.0
      description: Compress PNG images stored in S3 using R-quadtree algorithms.
    servers:
      - url: https://mzcnrbtvod.execute-api.eu-west-3.amazonaws.com/prod
    paths:
      /compress:
        post:
          summary: Compress a PNG image
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required: [inputPath, outputPath, method, threshold]
                  properties:
                    inputPath:
                      type: string
                      example: s3://image-compression-input-3a8a19c0/256-tux.png
                    outputPath:
                      type: string
                      example: s3://image-compression-output-3a8a19c0/256-tux-compressed.png
                    method:
                      type: string
                      enum: [lambda, phi]
                    threshold:
                      type: integer
          responses:
            '200':
              description: Compression result
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      success:       { type: boolean }
                      message:       { type: string }
                      outputPath:    { type: string }
                      eqm:           { type: number }
                      executionTimeMs: { type: integer }


# =====================================================================
# RESOURCES (AWS infrastructure)
# =====================================================================
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: s3-input-bucket
  description: >
    S3 bucket "image-compression-input-<suffix>" - clients upload PNGs here.
    ObjectCreated events are routed to the SQS queue.
  tags: [aws, s3]
spec:
  type: s3-bucket
  owner: team-image-compression
  system: image-compression-aws
  dependsOn:
    - resource:sqs-image-queue

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: s3-output-bucket
  description: >
    S3 bucket "image-compression-output-<suffix>" - destination for compressed
    images written by the SQS Lambda.
  tags: [aws, s3]
spec:
  type: s3-bucket
  owner: team-image-compression
  system: image-compression-aws

---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: sqs-image-queue
  description: >
    SQS queue "image-compression-queue" buffering S3 ObjectCreated events.
    Lambda image-compression-sqs polls it (event source mapping).
